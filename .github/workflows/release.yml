name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: error

  release:
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: artifacts
          merge-multiple: true

      - name: Compute version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          echo "# HeartBeatCat ${{ steps.version.outputs.version }}" > release-notes.md
          echo "" >> release-notes.md

          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "### ✨ 首次发布" >> release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (@%an)" >> release-notes.md
          else
            echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${GITHUB_REF_NAME}" >> release-notes.md
            echo "" >> release-notes.md
            echo "### 更新内容" >> release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (@%an)" ${PREV_TAG}..HEAD >> release-notes.md
          fi

          echo "" >> release-notes.md
          echo "" >> release-notes.md
          echo "### 安装包" >> release-notes.md
          echo "" >> release-notes.md
          echo "| 平台 | 架构 |" >> release-notes.md
          echo "|------|------|" >> release-notes.md
          echo "| macOS | Apple Silicon (aarch64) / Intel (x86_64) |" >> release-notes.md
          echo "| Windows | x86_64 |" >> release-notes.md
          echo "| Linux | x86_64 |" >> release-notes.md

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: HeartBeatCat ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
