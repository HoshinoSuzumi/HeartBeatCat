name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - runner: macos-latest
            target: aarch64-apple-darwin
            paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"

          node -e "
          const assert = require('assert');
          const tag = '$TAG_VERSION';

          const pkg = require('./package.json');
          assert.strictEqual(pkg.version, tag, 'package.json version mismatch: ' + pkg.version + ' != ' + tag);

          const conf = require('./src-tauri/tauri.conf.json');
          assert.strictEqual(conf.version, tag, 'tauri.conf.json version mismatch: ' + conf.version + ' != ' + tag);

          const cargo = require('fs').readFileSync('src-tauri/Cargo.toml', 'utf8');
          const m = cargo.match(/^version\s*=\s*\"([^\"]+)\"/m);
          assert.ok(m, 'Cargo.toml missing version field');
          assert.strictEqual(m[1], tag, 'Cargo.toml version mismatch: ' + m[1] + ' != ' + tag);

          console.log('All versions match:', tag);
          "

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Ad-hoc sign macOS app and recreate DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          APP_NAME="HeartBeatCat"

          echo "Signing .app with ad-hoc signature..."
          codesign --force --deep --sign - "${APP_DIR}/${APP_NAME}.app"
          codesign --verify --deep --strict "${APP_DIR}/${APP_NAME}.app"
          echo "Signature OK"

          echo "Recreating DMG from signed app..."
          # Remove the old unsigned DMG
          rm -f "${DMG_DIR}"/*.dmg

          # Determine arch suffix matching Tauri convention
          TARGET="${{ matrix.target }}"
          case "$TARGET" in
            aarch64-*) ARCH="aarch64" ;;
            x86_64-*)  ARCH="x64" ;;
            *)         ARCH="unknown" ;;
          esac

          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="${APP_NAME}_${VERSION}_${ARCH}.dmg"

          # Create a temporary directory for DMG contents
          TMP_DMG=$(mktemp -d)
          cp -R "${APP_DIR}/${APP_NAME}.app" "${TMP_DMG}/"
          # Create a symlink to /Applications for drag-to-install
          ln -s /Applications "${TMP_DMG}/Applications"

          hdiutil create -volname "${APP_NAME}" -srcfolder "${TMP_DMG}" -ov -format UDZO "${DMG_DIR}/${DMG_NAME}"
          rm -rf "${TMP_DMG}"
          echo "DMG created: ${DMG_DIR}/${DMG_NAME}"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  release:
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: artifacts
          merge-multiple: true

      - name: Compute version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${GITHUB_REF_NAME}" >> release-notes.md

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
